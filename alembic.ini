# Alembic configuration. The actual database URL is injected by ``migrations/env.py``
# from butler.core.config (which reads .env / process env).
[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# Placeholder; env.py overrides at runtime.
sqlalchemy.url = postgresql+asyncpg://placeholder

[post_write_hooks]
# Run ruff format on freshly generated migration files.
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
